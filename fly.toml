# fly.toml app configuration file generated for trustrender-api on 2026-04-11T16:26:40-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trustrender-api'
primary_region = 'ams'

[build]

[env]
  TRUSTRENDER_CORS_ORIGINS = 'https://trustrender.dev,https://www.trustrender.dev'
  TRUSTRENDER_TEMPLATES_DIR = '/app/examples'

[http_service]
  internal_port = 8190
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
